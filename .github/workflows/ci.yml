name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --features polars,oauth -- -D warnings

      - name: test
        run: cargo test --features polars,oauth

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: integration test
        env:
          YNAB_TOKEN: ${{ secrets.YNAB_TOKEN }}
          YNAB_TEST_PLAN_ID: ${{ secrets.YNAB_TEST_PLAN_ID }}
        run: cargo test --features polars,oauth,integration
